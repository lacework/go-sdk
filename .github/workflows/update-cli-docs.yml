name: Update CLI Docs

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Release]
    types:
      - completed

jobs:
  update-cli-docs:
    # Run after a successful Release, or when dispatched manually (where
    # github.event.workflow_run is absent and the conclusion check is false).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      git-sha: ${{ steps.update.outputs.git-sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: lacework/docs_lw
          token: ${{ secrets.TOKEN }}
          path: docs_lw
      - name: Run update script
        id: update
        env:
          GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        working-directory: "docs_lw/docusaurus"
        run: |
          # Keep the token-authenticated HTTPS remote configured by actions/checkout
          # above. Switching origin to SSH (git@github.com) fails the docs push with
          # "Permission denied (publickey)" because no SSH key is loaded in CI.
          sudo apt-get update -y
          sudo apt-get install gpg-agent -y
          echo "$GPG_SECRET_KEY" | base64 --decode | gpg --import --no-tty --batch --yes
          scripts/codefresh/update-cli-docs.sh
          output=$(git rev-parse HEAD)
          echo "git-sha=${output}" >> $GITHUB_OUTPUT
      - name: Notify Slack for Approval
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "#4db748",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Lacework CLI documentation update*\nNew documentation for the Lacework CLI has been generated and it is waiting for approval. :hand::skin-tone-4: @docs :party-dinosaur: :go__lw:\n*GitHub Workflow*\nhttps://github.com/lacework/go-sdk/actions/runs/${{ github.run_id }}\n*Git SHA*\n${{ steps.update.outputs.git-sha }}"
                      }
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_DOC_PULL_REQUESTS }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
  # NOTE: the former `deploy-cli-docs` job was removed. It published the docs to
  # the legacy Netlify site behind docs.lacework.net, which now 301-redirects to
  # docs.fortinet.com/product/lacework-forticnapp. The Netlify site was
  # decommissioned, so the job failed on every run (Netlify API 404). CLI docs
  # are now published through Fortinet's docs pipeline.
